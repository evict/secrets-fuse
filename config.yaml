op_account: ""  # default 1Password account (can be overridden per-secret)

secrets:
  - path: "~/.config/app/secrets.json"      # path the app tries to open
    reference: "op://[VAULT-UUID]/[ITEM-UUID]/[VAULT-FIELD]"
    # filename: "secrets.json"              # optional: FUSE filename (defaults to basename of path)
    max_reads: 0                            # 0 = unlimited
    writable: false
    trusted_binaries:                       # SHA-256 hashes of allowed executables
      # Generate with: secrets-guard -hash /usr/bin/myapp
      # - "sha256:abc123..."
    # op_account: ""                        # optional: override account for this secret
