name: Linux Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:  
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: true
    
    - name: Build
      run: go build -o /dev/null .

    - name: Run tests
      run: go test -v ./fuse/... ./seccomp/...
